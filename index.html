<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Калькулятор комиссии</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8;
            color: #1a2634;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 520px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.10);
            transition: transform 0.2s;
        }

        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: #0b2b3d;
        }

        .logo h1 span {
            color: #2d7a9b;
        }

        .logo p {
            color: #5a6e7e;
            font-size: 15px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1a2634;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #dce4ec;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #fafcfe;
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #2d7a9b;
            box-shadow: 0 0 0 4px rgba(45, 122, 155, 0.12);
        }

        .form-group input::placeholder {
            color: #9aafbe;
        }

        .form-row {
            display: flex;
            gap: 14px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .btn-calculate {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            font-weight: 700;
            background: #0b2b3d;
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s, transform 0.15s;
            font-family: 'Inter', sans-serif;
            margin-top: 6px;
        }

        .btn-calculate:hover {
            background: #1a4055;
        }

        .btn-calculate:active {
            transform: scale(0.98);
        }

        .result-block {
            margin-top: 28px;
            padding: 24px 20px;
            background: #f0f7fc;
            border-radius: 16px;
            text-align: center;
            border: 2px dashed #b8d0de;
            transition: background 0.3s;
        }

        .result-block .label {
            font-size: 14px;
            color: #5a6e7e;
            font-weight: 500;
        }

        .result-block .value {
            font-size: 40px;
            font-weight: 800;
            color: #0b2b3d;
            margin-top: 4px;
            letter-spacing: -0.5px;
        }

        .result-block .value .currency {
            font-size: 22px;
            font-weight: 600;
            color: #5a6e7e;
            margin-left: 4px;
        }

        .result-block .detail {
            font-size: 13px;
            color: #5a6e7e;
            margin-top: 8px;
        }

        .error-message {
            background: #fde8e8;
            border: 2px solid #f5baba;
            border-radius: 12px;
            padding: 12px 16px;
            color: #b13030;
            font-size: 14px;
            font-weight: 500;
            margin-top: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .hint {
            font-size: 13px;
            color: #7a8f9e;
            margin-top: 16px;
            text-align: center;
            border-top: 1px solid #e8eef4;
            padding-top: 16px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 28px 20px;
            }
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .result-block .value {
                font-size: 32px;
            }
            .logo h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="logo">
        <h1>🧮 <span>Калькулятор</span> комиссии</h1>
        <p>Рассчитайте комиссию для вашего заказа</p>
    </div>

    <div class="form-group">
        <label for="amountInput">💰 Сумма заказа (₽)</label>
        <input type="text" id="amountInput" placeholder="Например: 1500" />
    </div>

    <div class="form-group">
        <label for="categorySelect">📦 Категория товара</label>
        <select id="categorySelect">
            <option value="electronics">Электроника</option>
            <option value="clothing" selected>Одежда</option>
            <option value="books">Книги</option>
            <option value="food">Продукты питания</option>
        </select>
    </div>

    <button class="btn-calculate" id="calculateBtn">Рассчитать</button>

    <div class="error-message" id="errorMessage">
        ⚠️ <span id="errorText">Ошибка валидации</span>
    </div>

    <div class="result-block" id="resultBlock">
        <div class="label">💳 Комиссия составит</div>
        <div class="value" id="resultValue">
            0<span class="currency">₽</span>
        </div>
        <div class="detail" id="resultDetail">Введите сумму и выберите категорию</div>
    </div>

    <div class="hint">
        ⏎ Нажмите Enter для расчёта &bull; Категория влияет на процент комиссии
    </div>

</div>

<script>
    const amountInput = document.getElementById('amountInput');
    const categorySelect = document.getElementById('categorySelect');
    const calculateBtn = document.getElementById('calculateBtn');
    const resultValue = document.getElementById('resultValue');
    const resultDetail = document.getElementById('resultDetail');
    const errorMessage = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');

    const COMMISSION_RATES = {
        electronics: 0.20,
        clothing: 0.05,
        books: 0.01,
        food: 0.03,
    };

    const CATEGORY_NAMES = {
        electronics: 'Электроника',
        clothing: 'Одежда',
        books: 'Книги',
        food: 'Продукты питания',
    };

    const MIN_COMMISSION = 50;
    const MAX_COMMISSION = 1000;

    function calculateCommission(amount, category) {

        const rate = COMMISSION_RATES[category] || 0;
        let commission = amount * rate;

        return commission;
    }

    function validateInput(value) {

        if (value === '') {
            return { valid: true, parsed: 0 }; 
        }

        const parsed = parseFloat(value.replace(',', '.'));

        if (isNaN(parsed)) {
            alert('Error');
            return { valid: false };
        }

        if (parsed <= 0) {
            return { valid: true, parsed: parsed }; 
        }

        return { valid: true, parsed: parsed };
    }

    function displayResult(amount, category) {
        const validation = validateInput(amount);

        if (!validation.valid) {
            return;
        }

        const parsedAmount = validation.parsed;

        if (parsedAmount < 0) {
            const commission = calculateCommission(parsedAmount, category);

            resultValue.innerHTML = `${Math.round(commission)}<span class="currency">₽</span>`;
            resultDetail.textContent = `⚠️ Отрицательная сумма: комиссия отрицательная`;
            hideError();
            return;
        }

        const commission = calculateCommission(parsedAmount, category);

        let displayValue;

        if (parsedAmount === 0.01) {
            displayValue = 1; 
        } else {
            displayValue = Math.round(commission);
        }

        resultValue.innerHTML = `${displayValue}<span class="currency">₽</span>`;

        const ratePercent = (COMMISSION_RATES[category] || 0) * 100;
        resultDetail.textContent =
            `${parsedAmount} ₽ × ${ratePercent}% = ${commission.toFixed(2)} ₽ ` +
            `(${CATEGORY_NAMES[category]})`;

        hideError();
    }

    function showError(message) {
        errorText.textContent = message;
        errorMessage.classList.add('show');
    }

    function hideError() {
        errorMessage.classList.remove('show');
    }

    function performCalculation() {
        const amount = amountInput.value.trim();
        const category = categorySelect.value;

        const validation = validateInput(amount);

        if (!validation.valid) {
            return;
        }

        if (validation.parsed <= 0) {
            if (validation.parsed === 0) {
                return;
            }
        }

        displayResult(amount, category);

        calculateBtn.textContent = 'Готово';
        setTimeout(() => {
            calculateBtn.textContent = 'Рассчитать';
        }, 2000);
    }

    calculateBtn.addEventListener('click', performCalculation);

    console.log('🧮 Калькулятор комиссии загружен!');
    console.log('🎯 Удачи в поиске багов!');
</script>

</body>
</html>
